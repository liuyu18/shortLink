server.port=8002

spring.application.name=dcloud-link
spring.cloud.nacos.discovery.server-addr=192.168.188.140:8848
spring.cloud.nacos.discovery.username=nacos
spring.cloud.nacos.discovery.password=nacos

spring.redis.client=jedis
spring.redis.host=192.168.188.140
spring.redis.password=1234abcd
spring.redis.port=6379
spring.redis.jedis.pool.max-active=100
spring.redis.jedis.pool.max-idle=100
spring.redis.jedis.pool.min-idle=100
spring.redis.jedis.pool.max-wait=60000

spring.shardingsphere.datasource.names=ds0
spring.shardingsphere.datasource.ds0.connectionTimeoutMilliseconds=30000
spring.shardingsphere.datasource.ds0.driver-class-name=com.mysql.cj.jdbc.Driver
spring.shardingsphere.datasource.ds0.idleTimeoutMilliseconds=60000
spring.shardingsphere.datasource.ds0.jdbc-url=jdbc:mysql://192.168.188.140:3306/dcloud_link?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.shardingsphere.datasource.ds0.maintenanceIntervalMilliseconds=30000
spring.shardingsphere.datasource.ds0.maxLifetimeMilliseconds=1800000
spring.shardingsphere.datasource.ds0.maxPoolSize=50
spring.shardingsphere.datasource.ds0.minPoolSize=50
spring.shardingsphere.datasource.ds0.password=1234abcd
spring.shardingsphere.datasource.ds0.type=com.zaxxer.hikari.HikariDataSource
spring.shardingsphere.datasource.ds0.username=root

spring.shardingsphere.props.sql.show=true

spring.shardingsphere.sharding.tables.short_link.actual-data-nodes=ds0.short_link_$->{0..1}
spring.shardingsphere.sharding.tables.short_link.table-strategy.inline.algorithm-expression=short_link_$->{ code_hash % 2 }
spring.shardingsphere.sharding.tables.short_link.table-strategy.inline.sharding-column=code_hash
spring.shardingsphere.sharding.tables.short_link.key-generator.column=id
spring.shardingsphere.sharding.tables.short_link.key-generator.props.worker.id=${workId}
spring.shardingsphere.sharding.tables.short_link.key-generator.type=SNOWFLAKE
